<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu+Sans:ital,wght@0,100..800;1,100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu+Sans:ital,wght@0,100..800;1,100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    
    <script src="https://kit.fontawesome.com/79078fdc05.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="intro">
        <h3>Contact Me</h3>
        <p>
            Let's build something together.
        </p>
        <p>
            Feel free to send me a message.
        </p>
    </div>
    <div class="form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your Email">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
    </div>
    <div class="contacts">
        <div class="contact">
            <i class="fa-regular fa-envelope"> Email</i>
            <div class="text">
              <mailto href="mailto:deryk.thine@example.com">deryk.thine@example.com</mailto>
            </div>
        </div>
        <div class="contact">
            <i class="fa-brands fa-github"> GitHub</i>
            <div class="text">
                <a href="https://github.com/deryk4" target="_blank">github.com/deryk4</a>
            </div>
        </div>
        
        <div class="contact">
            <i class="fa-brands fa-linkedin-in"> LinkedIn</i>
            <div class="text">
                <a href="https://linkedin.com/in/deryk-thine" target="_blank">linkedin.com/in/deryk-thine</a>
            </div>
        </div>
    </div>
</body>
</html>
